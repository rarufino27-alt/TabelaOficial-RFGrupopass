<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>RF – Viagem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>
   
<style>
/* =========================================================
   RF PASSAGEIRO — PREMIUM THEME
   Dark dashboard + glassmorphism
   Cole este arquivo em theme/premium.css e importe no <head>
   ========================================================= */

:root{
  --bg-0:#020617;
  --bg-1:#0F172A;
  --bg-2:#0b1224;
  --surface:rgba(255,255,255,0.04);
  --surface-2:rgba(255,255,255,0.06);
  --surface-3:rgba(255,255,255,0.09);
  --border:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.16);
  --text:#E2E8F0;
  --text-dim:#94A3B8;
  --text-mute:#64748B;
  --brand:#3B82F6;
  --brand-2:#6366F1;
  --accent:#22C55E;
  --accent-2:#16A34A;
  --danger:#EF4444;
  --shadow-lg:0 30px 80px -20px rgba(0,0,0,.6),0 8px 24px -8px rgba(0,0,0,.5);
  --shadow-md:0 12px 32px -12px rgba(0,0,0,.55);
  --radius:22px;
  --radius-sm:14px;
  --font:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}

*,*::before,*::after{box-sizing:border-box}

html,body{
  margin:0;padding:0;
  min-height:100%;
  font-family:var(--font);
  color:var(--text);
  background:
    radial-gradient(1200px 600px at 80% -10%,rgba(99,102,241,.18),transparent 60%),
    radial-gradient(900px 500px at -10% 110%,rgba(34,197,94,.10),transparent 60%),
    linear-gradient(180deg,var(--bg-1) 0%,var(--bg-0) 100%);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
}

/* ====== HEADER ====== */
.top-white{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;
  background:rgba(2,6,23,.6);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-img{width:36px;height:36px;border-radius:10px;box-shadow:0 6px 18px rgba(59,130,246,.35)}
.logo-text-dark{
  font-weight:700;letter-spacing:.4px;color:#fff;
  font-size:15px;
}
.logo-text-dark::after{
  content:" • Grupo RF";
  color:var(--text-dim);font-weight:500;
}
.menu-btn-dark{
  width:42px;height:42px;display:grid;place-items:center;
  border-radius:12px;cursor:pointer;color:#fff;
  background:var(--surface);border:1px solid var(--border);
  transition:.2s;
}
.menu-btn-dark:hover{background:var(--surface-3);border-color:var(--border-strong)}

/* ====== SLIDER (oculto no premium) ====== */
.slider,.indicadores{display:none !important}

/* ====== LAYOUT DASHBOARD ====== */
.center{
  max-width:1080px;
  margin:36px auto 24px;
  padding:0 24px;
  display:grid;
  grid-template-columns:1.15fr .85fr;
  gap:24px;
  align-items:start;
}

.titulo-box{grid-column:1 / -1;margin-bottom:4px}
.titulo-central{
  font-size:30px;font-weight:700;letter-spacing:-.02em;
  color:#fff;
}
.titulo-central span{
  background:linear-gradient(90deg,#60A5FA,#22C55E);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.titulo-box::after{
  content:"Selecione origem, destino e categoria do veículo.";
  display:block;color:var(--text-dim);font-size:14px;margin-top:6px;
}

/* ====== CARD PRINCIPAL (esquerda) ====== */
.card{
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;gap:12px;
}

/* Campo (input glass) */
.campo{
  position:relative;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
  padding:14px 16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  cursor:pointer;
  transition:.22s ease;
}
.campo::before{
  content:attr(data-label);
  position:absolute;top:-8px;left:14px;
  font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-mute);
  background:linear-gradient(180deg,#0b1224,#0b1224);
  padding:0 6px;border-radius:4px;
}
.campo:hover{
  background:var(--surface-2);
  border-color:var(--border-strong);
  transform:translateY(-1px);
  box-shadow:0 10px 30px -16px rgba(59,130,246,.45);
}
.campo:focus-within,
.campo.is-active{
  border-color:rgba(59,130,246,.55);
  box-shadow:0 0 0 3px rgba(59,130,246,.18);
}
.campo-left{display:flex;align-items:center;gap:12px;color:#E2E8F0;font-weight:500;font-size:14.5px}
.dot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:0 0 0 4px rgba(255,255,255,.04)}
.dot.origem{background:#22C55E;box-shadow:0 0 12px rgba(34,197,94,.7)}
.dot.parada{background:#F59E0B;box-shadow:0 0 12px rgba(245,158,11,.7)}
.dot.destino{background:#EF4444;box-shadow:0 0 12px rgba(239,68,68,.7)}

.plus{
  width:30px;height:30px;border-radius:9px;
  display:grid;place-items:center;
  background:var(--surface-3);color:#fff;font-size:18px;font-weight:600;
  border:1px solid var(--border);
  transition:.2s;
}
.plus:hover{background:var(--brand);border-color:var(--brand)}

/* Select customizado (tipo carro) */
.rf-select{
  background:var(--surface-3);
  border:1px solid var(--border);
  padding:8px 14px;border-radius:10px;
  font-size:13px;color:#fff;
  display:inline-flex;align-items:center;gap:6px;
}
.rf-select::after{content:"▾";color:var(--text-dim);font-size:11px}

/* ====== PAINEL DE RESUMO (direita) ====== */
.summary-card{
  background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:var(--shadow-lg);
  position:sticky;top:96px;
  display:flex;flex-direction:column;gap:18px;
}
.summary-title{
  font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-mute);
}
.summary-route{
  display:flex;flex-direction:column;gap:10px;
  padding:14px;border-radius:14px;
  background:var(--surface);border:1px solid var(--border);
}
.summary-row{display:flex;align-items:center;gap:10px;font-size:14px;color:#fff}
.summary-row .dot{width:8px;height:8px}
.summary-row small{color:var(--text-dim);font-size:12px;display:block}

.summary-meta{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.meta-pill{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:10px 12px;
}
.meta-pill .lbl{font-size:11px;color:var(--text-mute);letter-spacing:.1em;text-transform:uppercase}
.meta-pill .val{font-size:14px;color:#fff;font-weight:600;margin-top:2px}

.price-block{
  border-top:1px dashed var(--border);
  padding-top:16px;
  display:flex;align-items:flex-end;justify-content:space-between;
}
.price-block .lbl{font-size:12px;color:var(--text-dim);letter-spacing:.14em;text-transform:uppercase}
.price-value{
  font-size:38px;font-weight:800;letter-spacing:-.03em;
  color:var(--accent);
  text-shadow:0 8px 30px rgba(34,197,94,.35);
  transition:transform .25s ease;
}
.price-value.bump{transform:scale(1.06)}

.summary-actions{display:flex;gap:10px}
.btn-ghost,.btn-primary{
  flex:1;height:48px;border-radius:14px;border:1px solid var(--border);
  font-size:14px;font-weight:600;cursor:pointer;transition:.2s;
}
.btn-ghost{background:var(--surface);color:#fff}
.btn-ghost:hover{background:var(--surface-3);border-color:var(--border-strong)}
.btn-primary{
  background:linear-gradient(135deg,#3B82F6,#6366F1);
  color:#fff;border:none;
  box-shadow:0 12px 30px -10px rgba(59,130,246,.6);
}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.4);transform:none;box-shadow:none}

/* ====== BOTTOM (botão antigo escondido — mantido p/ JS) ====== */
.bottom{display:none}

/* ====== MODAIS ====== */
.modal,.rf-modal{
  position:fixed;inset:0;z-index:80;
  background:rgba(2,6,23,.7);
  backdrop-filter:blur(8px);
  display:none;align-items:flex-end;justify-content:center;
  animation:fade .2s ease;
}
.modal-content,.rf-modal-content{
  width:100%;max-width:520px;
  background:linear-gradient(180deg,#0F172A,#0b1224);
  border:1px solid var(--border);
  border-radius:24px 24px 0 0;
  padding:18px;max-height:78vh;overflow:hidden;
  box-shadow:var(--shadow-lg);
  animation:slideUp .28s cubic-bezier(.2,.8,.2,1);
}
@media(min-width:720px){
  .modal,.rf-modal{align-items:center}
  .modal-content,.rf-modal-content{border-radius:20px}
}
#busca{
  width:100%;height:46px;padding:0 14px;
  background:var(--surface);color:#fff;
  border:1px solid var(--border);border-radius:12px;
  font-size:14px;outline:none;
}
#busca:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(59,130,246,.18)}
.lista{margin-top:12px;max-height:55vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.lista div{
  padding:13px 14px;border-radius:10px;cursor:pointer;
  background:var(--surface);border:1px solid transparent;
  color:#E2E8F0;font-size:14px;transition:.15s;
}
.lista div:hover{background:var(--surface-3);border-color:var(--border)}

.rf-option{
  padding:14px;border-radius:12px;cursor:pointer;
  background:var(--surface);border:1px solid var(--border);
  margin-bottom:8px;color:#fff;font-size:14px;font-weight:500;
  transition:.18s;
}
.rf-option:hover{background:var(--surface-3);border-color:var(--brand)}

/* ====== MENU LATERAL ====== */
.menu-overlay{
  display:none;position:fixed;inset:0;z-index:60;
  background:rgba(2,6,23,.6);backdrop-filter:blur(6px);
}
.menu{
  position:fixed;top:0;right:-320px;width:300px;height:100%;z-index:70;
  background:linear-gradient(180deg,#0F172A,#0b1224);
  border-left:1px solid var(--border);
  padding:24px;transition:.3s cubic-bezier(.2,.8,.2,1);
  box-shadow:var(--shadow-lg);
}
.menu.ativo{right:0}
.menu h3{margin:0 0 18px;color:#fff;font-size:18px}
.menu-item{
  padding:14px;border-radius:12px;cursor:pointer;color:#E2E8F0;
  background:var(--surface);border:1px solid var(--border);
  margin-bottom:10px;transition:.18s;
}
.menu-item:hover{background:var(--surface-3)}

/* ====== LOADING ====== */
.loading{
  position:fixed;inset:0;z-index:100;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(2,6,23,.85);backdrop-filter:blur(8px);color:#fff;
}
.loader{
  width:42px;height:42px;border-radius:50%;
  border:3px solid rgba(255,255,255,.1);
  border-top-color:var(--brand);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ====== RADAR (sutil, só decoração) ====== */
.radar-bg{position:fixed;bottom:-180px;right:-180px;width:520px;height:520px;pointer-events:none;opacity:.18;z-index:0}
.radar-circle{position:absolute;inset:0;border:1px solid rgba(59,130,246,.4);border-radius:50%;animation:pulse 4s ease-out infinite}
.radar-circle:nth-child(2){animation-delay:1s}
.radar-circle:nth-child(3){animation-delay:2s}
.radar-circle:nth-child(4){animation-delay:3s}
.radar-line{display:none}
@keyframes pulse{0%{transform:scale(.4);opacity:.8}100%{transform:scale(1.2);opacity:0}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ====== RESPONSIVO ====== */
@media (max-width:900px){
  .center{grid-template-columns:1fr;margin-top:24px;padding:0 16px}
  .summary-card{position:static}
  .titulo-central{font-size:24px}
  .top-white{padding:12px 16px}
}
@media (max-width:520px){
  .summary-meta{grid-template-columns:1fr}
  .price-value{font-size:32px}
}
   
<style/>
</head>

<body>

<div id="loading" class="loading">
<div class="loader"></div>
<span>Carregando rotas...</span>
</div>

<!-- MENU -->

<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">

<h3>Menu</h3>

<div class="menu-item" onclick="irPara('termos.html')">
📜 Regras do Grupo RF
</div>

<div class="menu-item" onclick="irPara('configuracoes.html')">
⚙️ Configurações
</div>

</div>

<!-- HEADER -->

<div class="top-white">

<div class="logo-area">
<img src="icons/icon-512.png" class="logo-img">
<span class="logo-text-dark">
RF PASSAGEIRO
</span>
</div>

<div class="menu-btn-dark" onclick="abrirMenu()">☰</div>

</div>

<!-- SLIDER -->

<div class="slider">
<div class="slides" id="slides">

<div class="slide" style="background-image:url('slides/slide1.jpg')"></div>
<div class="slide" style="background-image:url('slides/slide2.jpg')"></div>
<div class="slide" style="background-image:url('slides/slide3.jpg')"></div>
<div class="slide" style="background-image:url('slides/slide4.jpg')"></div>
<div class="slide" style="background-image:url('slides/slide5.jpg')"></div>

</div>
</div>

<div class="indicadores">
<div class="dotSlide ativo"></div>
<div class="dotSlide"></div>
<div class="dotSlide"></div>
<div class="dotSlide"></div>
<div class="dotSlide"></div>
</div>

<div class="center">

<div class="titulo-box">
<div class="titulo-central">
Para onde <span>vamos</span> hoje?
</div>
</div>

<div class="card">

<div class="campo" id="origemBtn">
<div class="campo-left">
<div class="dot origem"></div>
<div id="origemTexto">Selecionar origem</div>
</div>
</div>

<div class="campo" id="paradaBtn" style="display:none;">
<div class="campo-left">
<div class="dot parada"></div>
<div id="paradaTexto">Selecionar parada</div>
</div>
</div>

<div class="campo" id="destinoBtn">
<div class="campo-left">
<div class="dot destino"></div>
<div id="destinoTexto">Selecionar destino</div>
</div>

<script>

/* =========================
   INICIALIZAÇÃO SEGURA
========================= */

async function init(){

const loading = document.getElementById("loading");

loading.style.display="flex";

try{

await DataManager.carregar();

console.log("Rotas carregadas:", DataManager.rotas.length);

}catch(e){

alert("Erro ao carregar rotas. Reinicie o aplicativo.");

console.error(e);

}

loading.style.display="none";

}

init();

/* =========================
   SLIDER
========================= */

let slideIndex=0;
const slides=document.getElementById("slides");
const dots=document.querySelectorAll(".dotSlide");

setInterval(()=>{

slideIndex++;

if(slideIndex>=5) slideIndex=0;

slides.style.transform=`translateX(-${slideIndex*100}%)`;

dots.forEach(d=>d.classList.remove("ativo"));

dots[slideIndex].classList.add("ativo");

},4000);

/* =========================
   MENU
========================= */

function abrirMenu(){

document.getElementById("menu").classList.add("ativo");

document.getElementById("menuOverlay").style.display="block";

}

function fecharMenu(){

document.getElementById("menu").classList.remove("ativo");

document.getElementById("menuOverlay").style.display="none";

}

function irPara(p){

window.location.href=p;

}

/* =========================
   SISTEMA
========================= */

let origem=null;
let parada=null;
let destino=null;
let modo=null;

const modal=document.getElementById("modal");
const lista=document.getElementById("lista");
const busca=document.getElementById("busca");
const confirmarBtn=document.getElementById("confirmar");

/* ABRIR MODAL */

function abrirModal(tipo){

if(tipo!=="origem" && !origem){

alert("Selecione a origem primeiro.");

return;

}

modo=tipo;

busca.value="";

modal.style.display="flex";

let dados=[];

if(tipo==="origem") dados=DataManager.listarOrigens();

if(tipo==="parada"){

dados=DataManager.listarDestinos(origem)
.filter(p=>DataManager.listarDestinos(p).length>0);

}

if(tipo==="destino"){

dados=parada
?DataManager.listarDestinos(parada)
:DataManager.listarDestinos(origem);

}

renderLista(dados);

}

/* LISTA */

function renderLista(arr){

lista.innerHTML="";

arr.forEach(item=>{

const div=document.createElement("div");

div.innerText=item;

div.onclick=()=>{

selecionar(item);

modal.style.display="none";

};

lista.appendChild(div);

});

}

/* BUSCA */

busca.addEventListener("input",()=>{

const termo=busca.value.toLowerCase();

Array.from(lista.children).forEach(div=>{

div.style.display=div.innerText.toLowerCase().includes(termo)
? "block"
: "none";

});

});

/* TIPO CARRO */

const tipoCarroBtn=document.getElementById("tipoCarroBtn");
const modalTipoCarro=document.getElementById("modalTipoCarro");
const tipoCarroTexto=document.getElementById("tipoCarroTexto");
const tipoCarroInput=document.getElementById("tipoCarro");

tipoCarroBtn.onclick=()=>{

modalTipoCarro.style.display="flex";

};

document.querySelectorAll("#modalTipoCarro .rf-option").forEach(opcao=>{

opcao.onclick=()=>{

const valor=opcao.dataset.value;

tipoCarroInput.value=valor;

tipoCarroTexto.innerText=opcao.innerText;

modalTipoCarro.style.display="none";

};

});

modalTipoCarro.onclick=(e)=>{

if(e.target===modalTipoCarro){

modalTipoCarro.style.display="none";

}

};

/* SELEÇÃO */

function selecionar(valor){

if(modo==="origem"){

origem=valor;

parada=null;

destino=null;

origemTexto.innerText=valor;

paradaTexto.innerText="Selecionar parada";

destinoTexto.innerText="Selecionar destino";

paradaBtn.style.display="none";

}

if(modo==="parada"){

parada=valor;

destino=null;

paradaTexto.innerText=valor;

}

if(modo==="destino"){

destino=valor;

destinoTexto.innerText=valor;

}

confirmarBtn.disabled=!(origem && destino);

}

origemBtn.onclick=()=>abrirModal("origem");

paradaBtn.onclick=()=>abrirModal("parada");

destinoBtn.onclick=()=>abrirModal("destino");

addParada.onclick=(e)=>{

e.stopPropagation();

if(!origem){

alert("Selecione a origem primeiro.");

return;

}

paradaBtn.style.display="flex";

};

modal.onclick=e=>{

if(e.target===modal){

modal.style.display="none";

}

};

/* CONFIRMAR */

confirmarBtn.onclick=()=>{

let valorTotal=0;

if(!parada){

valorTotal=DataManager.buscarValor(origem,destino)||0;

}else{

const p1=DataManager.buscarValor(origem,parada)||0;
const p2=DataManager.buscarValor(parada,destino)||0;

valorTotal=p1+p2;

}

const tipoCarro=parseFloat(tipoCarroInput.value);

localStorage.setItem("rf_corrida_temp",JSON.stringify({

origem,
parada,
destino,
valor:valorTotal,
categoria:tipoCarro

}));

window.location.href="resumo.html";

};

/* TEMA */

(function(){

const temaSalvo=localStorage.getItem("rf_theme")||"dark";

document.body.setAttribute("data-theme",temaSalvo);

})();

</script>
