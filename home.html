<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF – Viagem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:radial-gradient(circle at top,#1f1f1f 0%,#0a0a0a 55%,#000 100%);
color:#fff;
height:100vh;
overflow:hidden;
}

/* HEADER */

.top-white{
background:#fff;
padding:20px 20px 28px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom-left-radius:32px;
border-bottom-right-radius:32px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.logo-area{
display:flex;
align-items:center;
gap:14px;
}

.logo-img{
height:60px;
border-radius:16px;
}

.logo-text-dark{
font-weight:900;
letter-spacing:1px;
color:#000;
font-size:1.1rem;
}

.menu-btn-dark{
font-size:24px;
cursor:pointer;
color:#000;
}

/* MENU LATERAL */

.menu-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
z-index:99;
}

.menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#1a1a1a;
transition:left .3s ease;
z-index:100;
padding:20px;
}

.menu.ativo{
left:0;
}

.menu h3{
margin-bottom:20px;
color:#ffd700;
}

.menu-item{
padding:14px 0;
border-bottom:1px solid rgba(255,255,255,.08);
cursor:pointer;
}

.menu-item:hover{
color:#ffd700;
}

/* SLIDER */

.slider{
width:90%;
max-width:420px;
margin:20px auto;
overflow:hidden;
border-radius:18px;
border:1px solid rgba(255,215,0,0.2);
box-shadow:0 10px 25px rgba(0,0,0,.6);
}

.slides{
display:flex;
transition:transform .6s ease;
}

.slide{
min-width:100%;
height:110px;
background-size:cover;
background-position:center;
}

/* INDICADORES */

.indicadores{
display:flex;
justify-content:center;
gap:6px;
margin-top:6px;
}

.dotSlide{
width:6px;
height:6px;
border-radius:50%;
background:#555;
}

.dotSlide.ativo{
background:#ffd700;
}

/* CENTRO */

.center{
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:420px;
}

.titulo-central{
text-align:center;
font-weight:700;
font-size:1.3rem;
margin-bottom:30px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.04);
backdrop-filter:blur(16px);
border-radius:22px;
padding:22px;
box-shadow:0 10px 30px rgba(0,0,0,.8);
border:1px solid rgba(255,215,0,0.12);
position:relative;
}

.card::before{
content:"";
position:absolute;
top:0;
left:0;
width:60px;
height:3px;
background:linear-gradient(90deg,#ffd700,#ffb800);
}

/* CAMPOS */

.campo{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 0;
border-bottom:1px solid rgba(255,255,255,.08);
cursor:pointer;
transition:.2s;
}

.campo:hover{
transform:translateX(4px);
}

.campo-left{
display:flex;
align-items:center;
gap:12px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
}

.origem{background:#22c55e;}
.parada{background:#ffd700;}
.destino{background:#ef4444;}

.plus{
font-size:20px;
color:#ffd700;
}

/* SELECT */

.select{
background:#111;
color:#fff;
border-radius:10px;
padding:6px;
border:1px solid rgba(255,255,255,.1);
}

/* BOTÃO */

.bottom{
position:absolute;
bottom:30px;
left:20px;
right:20px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:35px;
background:linear-gradient(135deg,#ffd700,#ffb800);
color:#000;
font-weight:900;
cursor:pointer;
}

button:disabled{
background:#333;
color:#777;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:200;
}

.modal-content{
background:#1c1c1c;
width:100%;
max-width:420px;
border-radius:20px;
padding:20px;
max-height:80vh;
display:flex;
flex-direction:column;
border:1px solid rgba(255,255,255,.08);
}

.modal-content input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,.1);
background:#111;
color:#fff;
margin-bottom:14px;
}

.lista{
overflow-y:auto;
flex:1;
}

.lista div{
padding:12px;
border-radius:10px;
cursor:pointer;
}

.lista div:hover{
background:#2a2a2a;
}

/* RF SELECT */

.rf-select{
background:#111;
border:1px solid rgba(255,255,255,.1);
border-radius:12px;
padding:10px 14px;
cursor:pointer;
min-width:120px;
text-align:right;
}

/* MODAL SELECT */

.rf-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:300;
}

.rf-modal-content{
background:#1c1c1c;
border-radius:18px;
width:90%;
max-width:340px;
overflow:hidden;
}

.rf-option{
padding:16px;
border-bottom:1px solid rgba(255,255,255,.08);
cursor:pointer;
text-align:center;
}

.rf-option:hover{
background:#2a2a2a;
}

/* RADAR FUNDO */

.radar-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
opacity:0.05;
z-index:-1;
display:flex;
align-items:center;
justify-content:center;
}

.radar-circle{
position:absolute;
border:1px solid rgba(255,215,0,0.25);
border-radius:50%;
animation:radarPulse 6s infinite;
}

.radar-circle:nth-child(1){
width:120px;
height:120px;
}

.radar-circle:nth-child(2){
width:260px;
height:260px;
}

.radar-circle:nth-child(3){
width:420px;
height:420px;
}

.radar-circle:nth-child(4){
width:600px;
height:600px;
}

/* varredura */

.radar-line{
position:absolute;
width:300px;
height:2px;
background:linear-gradient(90deg,transparent,#ffd700);
transform-origin:left center;
animation:radarSweep 10s linear infinite;
}

/* animações */

@keyframes radarSweep{
0%{ transform:rotate(0deg); }
100%{ transform:rotate(360deg); }
}

@keyframes radarPulse{
0%{opacity:0.2;}
50%{opacity:0.6;}
100%{opacity:0.2;}
}

</style>
</head>

<body>

<!-- MENU LATERAL -->

<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
<h3>Menu</h3>
<div class="menu-item" onclick="irPara('termos.html')">Regras do Grupo RF</div>
<div class="menu-item" onclick="irPara('configuracoes.html')">Configurações</div>
</div>

<!-- HEADER -->

<div class="top-white">

<div class="logo-area">
<img src="icons/icon-192.png" class="logo-img">
<span class="logo-text-dark">PASSAGEIRO RF</span>
</div>

<div class="menu-btn-dark" onclick="abrirMenu()">☰</div>

</div>

<!-- SLIDER -->

<div class="slider">
<div class="slides" id="slides">

<div class="slide" style="background-image:url('slides/slide1.jpg')"></div>
<div class="slide" style="background-image:url('slides/slide2.jpg')"></div>
<div class="slide" style="background-image:url('slides/slide3.jpg')"></div>
<div class="slide" style="background-image:url('slides/slide4.jpg')"></div>
<div class="slide" style="background-image:url('slides/slide5.jpg')"></div>

</div>
</div>

<div class="indicadores">
<div class="dotSlide ativo"></div>
<div class="dotSlide"></div>
<div class="dotSlide"></div>
<div class="dotSlide"></div>
<div class="dotSlide"></div>
</div>

<div class="center">

<div class="titulo-central">
Para onde vamos hoje?
</div>

<div class="card">

<div class="campo" id="origemBtn">
<div class="campo-left">
<div class="dot origem"></div>
<div id="origemTexto">Selecionar origem</div>
</div>
</div>

<div class="campo" id="paradaBtn" style="display:none;">
<div class="campo-left">
<div class="dot parada"></div>
<div id="paradaTexto">Selecionar parada</div>
</div>
</div>

<div class="campo" id="destinoBtn">
<div class="campo-left">
<div class="dot destino"></div>
<div id="destinoTexto">Selecionar destino</div>
</div>
<div class="plus" id="addParada">＋</div>
</div>

<div class="campo">

<div class="campo-left">
<div class="dot" style="background:#3b82f6;"></div>
<div>Tipo de veículo</div>
</div>

<div class="rf-select" id="tipoCarroBtn">
<span id="tipoCarroTexto">4 lugares</span>
</div>

<input type="hidden" id="tipoCarro" value="1">

</div>

</div>

</div>

<div class="bottom">
<button id="confirmar" disabled>Confirmar rota</button>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<input type="text" id="busca" placeholder="Buscar local...">
<div class="lista" id="lista"></div>
</div>
</div>

  <div class="rf-modal" id="modalTipoCarro">

<div class="rf-modal-content">

<div class="rf-option" data-value="1">
4 lugares
</div>

<div class="rf-option" data-value="1.5">
6 lugares (+50%)
</div>

</div>

</div>
  
<div class="radar-bg">

<div class="radar-circle"></div>
<div class="radar-circle"></div>
<div class="radar-circle"></div>
<div class="radar-circle"></div>

<div class="radar-line"></div>

</div>
<script>

/* SLIDER */

let slideIndex=0;
const slides=document.getElementById("slides");
const dots=document.querySelectorAll(".dotSlide");

setInterval(()=>{
slideIndex++;
if(slideIndex>=5) slideIndex=0;

slides.style.transform=`translateX(-${slideIndex*100}%)`;

dots.forEach(d=>d.classList.remove("ativo"));
dots[slideIndex].classList.add("ativo");

},4000);

/* MENU */

function abrirMenu(){
document.getElementById("menu").classList.add("ativo");
document.getElementById("menuOverlay").style.display="block";
}

function fecharMenu(){
document.getElementById("menu").classList.remove("ativo");
document.getElementById("menuOverlay").style.display="none";
}

function irPara(pagina){
window.location.href=pagina;
}

/* SISTEMA ORIGINAL */

let origem=null, parada=null, destino=null, modo=null;

const modal=document.getElementById("modal");
const lista=document.getElementById("lista");
const busca=document.getElementById("busca");
const confirmarBtn=document.getElementById("confirmar");
const tipoCarroSelect=document.getElementById("tipoCarro");

async function init(){
await DataManager.carregar();
}
init();

function abrirModal(tipo){

if(tipo!=="origem" && !origem){
alert("Selecione a origem primeiro.");
return;
}

modo=tipo;
busca.value="";
modal.style.display="flex";

let dados=[];

if(tipo==="origem") dados=DataManager.listarOrigens();

if(tipo==="parada"){
dados=DataManager.listarDestinos(origem)
.filter(p=>DataManager.listarDestinos(p).length>0);
}

if(tipo==="destino"){
dados=parada
?DataManager.listarDestinos(parada)
:DataManager.listarDestinos(origem);
}

renderLista(dados);

}

function renderLista(arr){

lista.innerHTML="";

arr.forEach(item=>{

const div=document.createElement("div");
div.innerText=item;

div.onclick=()=>{
selecionar(item);
modal.style.display="none";
};

lista.appendChild(div);

});

}

busca.addEventListener("input",()=>{

const termo=busca.value.toLowerCase();

Array.from(lista.children).forEach(div=>{

div.style.display=div.innerText.toLowerCase().includes(termo)
? "block"
: "none";

});

});

/* SELECT PREMIUM TIPO CARRO */

const tipoCarroBtn = document.getElementById("tipoCarroBtn");
const modalTipoCarro = document.getElementById("modalTipoCarro");
const tipoCarroTexto = document.getElementById("tipoCarroTexto");
const tipoCarroInput = document.getElementById("tipoCarro");

tipoCarroBtn.onclick = () => {
modalTipoCarro.style.display = "flex";
};

document.querySelectorAll("#modalTipoCarro .rf-option").forEach(opcao=>{
opcao.onclick = () => {

const valor = opcao.dataset.value;

tipoCarroInput.value = valor;
tipoCarroTexto.innerText = opcao.innerText;

modalTipoCarro.style.display = "none";

};
});

modalTipoCarro.onclick = (e)=>{
if(e.target === modalTipoCarro){
modalTipoCarro.style.display="none";
}
};

function selecionar(valor){

if(modo==="origem"){

origem=valor;
parada=null;
destino=null;

origemTexto.innerText=valor;
paradaTexto.innerText="Selecionar parada";
destinoTexto.innerText="Selecionar destino";
paradaBtn.style.display="none";

}

if(modo==="parada"){

parada=valor;
destino=null;
paradaTexto.innerText=valor;

}

if(modo==="destino"){

destino=valor;
destinoTexto.innerText=valor;

}

confirmarBtn.disabled=!(origem && destino);

}

origemBtn.onclick=()=>abrirModal("origem");
paradaBtn.onclick=()=>abrirModal("parada");
destinoBtn.onclick=()=>abrirModal("destino");

addParada.onclick=(e)=>{

e.stopPropagation();

if(!origem){
alert("Selecione a origem primeiro.");
return;
}

paradaBtn.style.display="flex";

};

modal.onclick=e=>{
if(e.target===modal) modal.style.display="none";
};

confirmarBtn.onclick=()=>{

let valorTotal=0;

if(!parada){

valorTotal=DataManager.buscarValor(origem,destino)||0;

}else{

const p1=DataManager.buscarValor(origem,parada)||0;
const p2=DataManager.buscarValor(parada,destino)||0;

valorTotal=p1+p2;

}

const tipoCarro=parseFloat(tipoCarroSelect.value);

localStorage.setItem("rf_corrida_temp",JSON.stringify({

origem,
parada,
destino,
valor:valorTotal,
categoria:tipoCarro

}));

window.location.href="resumo.html";

};

</script>

</body>
</html>
